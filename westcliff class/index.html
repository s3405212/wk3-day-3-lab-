<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recipe Time</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:50px;
}

.recipe{
    border:1px solid black;
    width:350px;
    margin:auto;
    padding:20px;
}
</style>

</head>

<body>

<h1>Today's Recipe</h1>

<div id="output"></div>

<script>

function showRecipe(){

let hour = new Date().getHours();
let output = document.getElementById("output");

if(hour < 17){

output.innerHTML =
`<div class="recipe">
<h2>Lunch Recipe</h2>
<ol>
<li>Prepare burger patty</li>
<li>Grill patty on medium heat</li>
<li>Toast bun while grilling meat</li>
<li>Prepare toppings</li>
<li>Assemble hamburger</li>
</ol>
</div>`;

}else{

output.innerHTML =
`<div class="recipe">
<h2>Dinner Recipe</h2>
<ol>
<li>Boil pasta</li>
<li>Cook tomato sauce</li>
<li>Add garlic and herbs</li>
<li>Mix pasta with sauce</li>
<li>Serve with cheese</li>
</ol>
</div>`;

}

}

showRecipe();

</script>

</body>
</html>
